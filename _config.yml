# SITE CONFIGURATION
url: https://yeon-lee.github.io # the base hostname & protocol for your site
title: Jong Yeon Lee # the website title (if blank, full name will be used instead)

# THEME-SPECIFIC CONFIGURATION
title: Jong Yeon's Group                                        # site's title
description: "Jong Yeon Lee's Group"                    # used by search engines
avatar:                      # Empty for no avatar in navbar
favicon:                     # Icon displayed in the tab

# Header and footer text
header_text: Yi-Zhuang You's Research Group
header_feature_image: assets/img/figures/cover.png
footer_text: <p><a href="https://illinois.edu/">UIUC</a> | <a href="https://physics.illinois.edu/">Department of Physics</a> | <a href="https://icmt.illinois.edu/CondensedMatter">Condensed Matter Group</a></p><p>Powered by <a href="https://jekyllrb.com/">Jekyll</a> with <a href="https://github.com/sylhare/Type-on-Strap">Type on Strap</a></p>

# Blog
excerpt: true                                           # Or "truncate" (first 250 characters), "false" to disable
post_navigation: true
color_image:                                            # A bit transparent for color posts.

# Features
# More in the _data folder for share buttons, author and language
# For layout customization, go to the "_sass > base" folder, and check "_variables.scss"
katex: true                                             # Enable if using math markup
mermaid: true                                           # Enable mermaid-js for sequence and diagrams
google_analytics: "G-FQFGBC4CGG"                        # Tracking ID, e.g. "UA-000000-01"
cookie_consent: false                                   # To respect the usage of cookies
color_theme: auto                                       # auto, dark or light

# Comments
comments:
  disqus_shortname:                                     # Your discus shortname for comments
  cusdis_app_id:                                        # Your cusdis data-app-id
  utterances:                                           # Enable by filling below information. For more info, go to https://utteranc.es
    repo:                                               # your public comments repository (e.g. owner/repo)
    issue-term:                                         # Issue term (e.g. "comment" consider issues with this word in the title as comments)

# PAGINATION
paginate: 5
paginate_path: "/blog/page:num"

# PORTFOLIO
collections:
  portfolio:
    output: true
    permalink: /:collection/:name

# BUILD SETTINGS
sass:
  style: compressed
plugins: [jekyll-paginate, jekyll-seo-tag, jekyll-feed]
exclude: [".jekyll-cache", ".idea", "vendor/*", "assets/node_modules/*"]

# theme: type-on-strap                                  # if using the theme as a jekyll theme gem
remote_theme: sylhare/Type-on-Strap                     # If using as a remote_theme in github